<section class="login-wrapper">
	<div class="product-card login-card">
		<h2 class="product-title">Iniciar sesión</h2>
		<p class="text-secondary">Acceso al frontend CMPG Northwind API.</p>

		<div *ngIf="error" class="alert error">{{ error }}</div>

		<form>
			<label>
				Correo electrónico
				<input type="email" [(ngModel)]="email" name="email" placeholder="admin@cmpg.com" required>
			</label>

			<label>
				Contraseña
				<input type="password" [(ngModel)]="password" name="password" placeholder="123456" required>
			</label>

			<button class="btn-buy" type="button" (click)="login()" [disabled]="loading">
				{{ loading ? 'Ingresando...' : 'Entrar' }}
			</button>
		</form>

		<div class="login-help">
			<b>Usuarios de prueba:</b><br>
			Correo: admin@cmpg.com  empleado@cmpg.com<br>
			Contraseña: 123456
		</div>
	</div>
</section>
